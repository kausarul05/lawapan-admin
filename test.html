<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket Bid Testing Interface</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #0f0f0f;
        color: white;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1f1f1f;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #4b5563;
      }
    </style>
  </head>
  <body class="p-6">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-3xl font-bold mb-2">Socket Bid Testing Interface</h1>
        <p class="text-gray-400">
          Test real-time bid functionality with Socket.IO
        </p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Left Column - Configuration & Controls -->
        <div class="lg:col-span-2 space-y-6">
          <!-- Connection Status -->
          <div class="bg-[#161616] rounded-xl border border-gray-800 p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold">Connection Status</h2>
              <div
                id="connectionStatus"
                class="px-3 py-1 rounded-full text-xs font-bold bg-red-500/20 text-red-400"
              >
                🔴 DISCONNECTED
              </div>
            </div>

            <!-- JWT Token Input -->
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-300 mb-2"
                >JWT Token *</label
              >
              <input
                type="text"
                id="jwtToken"
                placeholder="Paste your JWT token here (without 'Bearer')"
                class="w-full bg-[#1f1f1f] border border-gray-700 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-[#E7B20E] focus:ring-2 focus:ring-[#E7B20E]/20"
              />
            </div>

            <div class="flex gap-3">
              <button
                id="connectBtn"
                class="flex-1 px-4 py-2 bg-[#E7B20E] hover:bg-[#e9b005] text-black rounded-lg font-medium transition"
              >
                Connect Socket
              </button>
              <button
                id="disconnectBtn"
                class="flex-1 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition hidden"
              >
                Disconnect
              </button>
            </div>
          </div>

          <!-- Room Management -->
          <div class="bg-[#161616] rounded-xl border border-gray-800 p-6">
            <h2 class="text-xl font-bold mb-4">Room Management</h2>

            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-300 mb-2"
                >Shipment ID</label
              >
              <input
                type="text"
                id="shipmentId"
                placeholder="Enter shipment ID to join room"
                class="w-full bg-[#1f1f1f] border border-gray-700 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-[#E7B20E] focus:ring-2 focus:ring-[#E7B20E]/20"
              />
            </div>

            <div
              id="joinedRoomInfo"
              class="mb-3 p-3 bg-green-500/10 border border-green-500/30 rounded-lg hidden"
            >
              <p class="text-green-400 text-sm">
                Currently in room:
                <span id="currentRoom" class="font-mono"></span>
              </p>
            </div>

            <div class="flex gap-3">
              <button
                id="joinRoomBtn"
                class="flex-1 px-4 py-2 bg-[#E7B20E] hover:bg-[#e9b005] text-black rounded-lg font-medium transition"
              >
                Join Room
              </button>
              <button
                id="leaveRoomBtn"
                class="flex-1 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition"
              >
                Leave Room
              </button>
            </div>
          </div>

          <!-- Create Bid -->
          <div class="bg-[#161616] rounded-xl border border-gray-800 p-6">
            <h2 class="text-xl font-bold mb-4">Create Bid</h2>

            <div class="space-y-3">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs text-gray-400 mb-1"
                    >Transporter ID</label
                  >
                  <input
                    type="text"
                    id="transporter_id"
                    value="697be5efc75cbc247f0e6a89"
                    class="w-full bg-[#1f1f1f] border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-[#E7B20E]"
                  />
                </div>
                <div>
                  <label class="block text-xs text-gray-400 mb-1"
                    >Shipment ID</label
                  >
                  <input
                    type="text"
                    id="bid_shipment_id"
                    value="697bbc23f1facde4e510c1d5"
                    class="w-full bg-[#1f1f1f] border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-[#E7B20E]"
                  />
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs text-gray-400 mb-1"
                    >Driver ID</label
                  >
                  <input
                    type="text"
                    id="driver_id"
                    value="697e12dba066e5be86b47ee4"
                    class="w-full bg-[#1f1f1f] border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-[#E7B20E]"
                  />
                </div>
                <div>
                  <label class="block text-xs text-gray-400 mb-1"
                    >Vehicle ID</label
                  >
                  <input
                    type="text"
                    id="vehicle_id"
                    value="697d1ade5f7a078fa03730d4"
                    class="w-full bg-[#1f1f1f] border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-[#E7B20E]"
                  />
                </div>
              </div>

              <div>
                <label class="block text-xs text-gray-400 mb-1"
                  >Bid Amount</label
                >
                <input
                  type="text"
                  id="bid_amount"
                  value="18000"
                  class="w-full bg-[#1f1f1f] border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-[#E7B20E]"
                />
              </div>
            </div>

            <button
              id="createBidBtn"
              class="w-full mt-4 px-4 py-3 bg-[#E7B20E] hover:bg-[#e9b005] text-black rounded-lg font-bold transition"
            >
              Create Bid
            </button>
          </div>

          <!-- Current Bids -->
          <div class="bg-[#161616] rounded-xl border border-gray-800 p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold">Current Bids</h2>
              <button
                id="refreshBidsBtn"
                class="px-4 py-2 bg-[#1f1f1f] hover:bg-[#2a2a2a] border border-gray-700 rounded-lg text-sm font-medium transition"
              >
                Refresh
              </button>
            </div>

            <div
              id="bidsList"
              class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar"
            >
              <p class="text-gray-500 text-sm text-center py-4">
                No bids found
              </p>
            </div>
          </div>
        </div>

        <!-- Right Column - Logs & Events -->
        <div class="space-y-6">
          <!-- Real-time Events -->
          <div class="bg-[#161616] rounded-xl border border-gray-800 p-6">
            <h2 class="text-xl font-bold mb-4">Real-time Events</h2>
            <div
              id="eventsList"
              class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar"
            >
              <p class="text-gray-500 text-sm">No events yet</p>
            </div>
          </div>

          <!-- Console Logs -->
          <div class="bg-[#161616] rounded-xl border border-gray-800 p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold">Console Logs</h2>
              <button
                id="clearLogsBtn"
                class="text-xs text-gray-400 hover:text-white transition"
              >
                Clear
              </button>
            </div>
            <div
              id="consoleLog"
              class="bg-black rounded-lg p-4 h-96 overflow-y-auto custom-scrollbar font-mono text-xs space-y-1"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let socket = null;
      let isConnected = false;
      let joinedRoom = null;

      // DOM Elements
      const jwtTokenInput = document.getElementById("jwtToken");
      const shipmentIdInput = document.getElementById("shipmentId");
      const connectionStatus = document.getElementById("connectionStatus");
      const connectBtn = document.getElementById("connectBtn");
      const disconnectBtn = document.getElementById("disconnectBtn");
      const joinRoomBtn = document.getElementById("joinRoomBtn");
      const leaveRoomBtn = document.getElementById("leaveRoomBtn");
      const createBidBtn = document.getElementById("createBidBtn");
      const refreshBidsBtn = document.getElementById("refreshBidsBtn");
      const clearLogsBtn = document.getElementById("clearLogsBtn");
      const consoleLog = document.getElementById("consoleLog");
      const eventsList = document.getElementById("eventsList");
      const bidsList = document.getElementById("bidsList");
      const joinedRoomInfo = document.getElementById("joinedRoomInfo");
      const currentRoom = document.getElementById("currentRoom");

      // Helper Functions
      function addLog(message, type = "info") {
        const timestamp = new Date().toLocaleTimeString();
        const logEntry = document.createElement("div");

        let colorClass = "text-gray-300";
        if (type === "success") colorClass = "text-green-400";
        if (type === "error") colorClass = "text-red-400";
        if (type === "event") colorClass = "text-[#E7B20E]";

        logEntry.className = colorClass;
        logEntry.innerHTML = `<span class="text-gray-600">[${timestamp}]</span> ${message}`;
        consoleLog.appendChild(logEntry);
        consoleLog.scrollTop = consoleLog.scrollHeight;
      }

      function addEvent(type, data) {
        const eventDiv = document.createElement("div");
        eventDiv.className =
          "bg-[#1f1f1f] border border-[#E7B20E]/30 rounded-lg p-3";

        const timestamp = new Date().toLocaleTimeString();
        eventDiv.innerHTML = `
                <div class="flex items-start justify-between mb-2">
                    <span class="text-xs font-bold text-[#E7B20E]">${type}</span>
                    <span class="text-xs text-gray-500">${timestamp}</span>
                </div>
                <pre class="text-xs text-gray-300 overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
            `;

        if (eventsList.querySelector("p.text-gray-500")) {
          eventsList.innerHTML = "";
        }
        eventsList.insertBefore(eventDiv, eventsList.firstChild);
      }

      function updateConnectionStatus(connected) {
        isConnected = connected;
        if (connected) {
          connectionStatus.className =
            "px-3 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400";
          connectionStatus.textContent = "🟢 CONNECTED";
          connectBtn.classList.add("hidden");
          disconnectBtn.classList.remove("hidden");
        } else {
          connectionStatus.className =
            "px-3 py-1 rounded-full text-xs font-bold bg-red-500/20 text-red-400";
          connectionStatus.textContent = "🔴 DISCONNECTED";
          connectBtn.classList.remove("hidden");
          disconnectBtn.classList.add("hidden");
        }
      }

      function updateBidsList(bids) {
        if (!bids || bids.length === 0) {
          bidsList.innerHTML =
            '<p class="text-gray-500 text-sm text-center py-4">No bids found</p>';
          return;
        }

        bidsList.innerHTML = "";
        bids.forEach((bid, index) => {
          const bidDiv = document.createElement("div");
          bidDiv.className =
            "bg-[#1f1f1f] border border-gray-800 rounded-lg p-3";
          bidDiv.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium">Bid Amount: <span class="text-[#E7B20E]">$${bid.bid_amount}</span></p>
                            <p class="text-xs text-gray-400 mt-1">Transporter: ${bid.transporter_id}</p>
                        </div>
                        <span class="text-xs text-gray-500">#${index + 1}</span>
                    </div>
                `;
          bidsList.appendChild(bidDiv);
        });
      }

      // Socket Functions
      function connectSocket() {
        const token = jwtTokenInput.value.trim();
        if (!token) {
          addLog("Please enter JWT token first", "error");
          return;
        }

        try {
          socket = io("https://logistics-shipment-management-backend.onrender.com", {
            transports: ["websocket", "polling"],
            auth: { token },
          });

          socket.on("connect", () => {
            updateConnectionStatus(true);
            addLog("✅ Socket connected successfully!", "success");
          });

          socket.on("disconnect", () => {
            updateConnectionStatus(false);
            addLog("❌ Socket disconnected", "error");
          });

          socket.on("connect_error", (error) => {
            addLog(`Connection error: ${error.message}`, "error");
          });

          // Real-time event listeners
          socket.on("shipment_bidding_started", (data) => {
            addLog(
              `📢 Bidding started for shipment: ${data.shipmentId}`,
              "event",
            );
            addEvent("shipment_bidding_started", data);
          });

          socket.on("new_bid", (data) => {
            addLog(`🎯 New bid received! Amount: ${data.bid_amount}`, "event");
            addEvent("new_bid", data);
            // Auto-fetch updated bids
            if (joinedRoom) {
              fetchBids(joinedRoom);
            }
          });

          socket.on("bid_accepted", (data) => {
            addLog(
              `✅ Bid accepted for transporter: ${data.transporterId}`,
              "event",
            );
            addEvent("bid_accepted", data);
          });
        } catch (error) {
          addLog(`Failed to connect: ${error.message}`, "error");
        }
      }

      function disconnectSocket() {
        if (socket) {
          socket.disconnect();
          socket = null;
          updateConnectionStatus(false);
          joinedRoom = null;
          joinedRoomInfo.classList.add("hidden");
          addLog("Socket disconnected manually", "info");
        }
      }

      function joinRoom() {
        if (!socket || !isConnected) {
          addLog("Please connect socket first", "error");
          return;
        }

        const shipmentId = shipmentIdInput.value.trim();
        if (!shipmentId) {
          addLog("Please enter shipment ID", "error");
          return;
        }

        socket.emit("join_shipment_room", shipmentId);
        joinedRoom = shipmentId;
        currentRoom.textContent = shipmentId;
        joinedRoomInfo.classList.remove("hidden");
        addLog(`🚪 Joined room: ${shipmentId}`, "success");

        // Auto-sync bid shipment ID
        document.getElementById("bid_shipment_id").value = shipmentId;

        // Auto-fetch bids
        fetchBids(shipmentId);
      }

      function leaveRoom() {
        if (!socket || !joinedRoom) return;

        socket.emit("leave_shipment_room", joinedRoom);
        addLog(`🚪 Left room: ${joinedRoom}`, "info");
        joinedRoom = null;
        joinedRoomInfo.classList.add("hidden");
      }

      async function createBid() {
        const token = jwtTokenInput.value.trim();
        if (!token) {
          addLog("Please enter JWT token", "error");
          return;
        }

        const bidData = {
          transporter_id: document.getElementById("transporter_id").value,
          shipment_id: document.getElementById("bid_shipment_id").value,
          driver_id: document.getElementById("driver_id").value,
          vehicle_id: document.getElementById("vehicle_id").value,
          bid_amount: document.getElementById("bid_amount").value,
        };

        createBidBtn.textContent = "Creating Bid...";
        createBidBtn.disabled = true;

        try {
          const response = await fetch("https://logistics-shipment-management-backend.onrender.com/api/v1/bid", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: token,
            },
            body: JSON.stringify(bidData),
          });

          const result = await response.json();
          console.log("Inside create bid", response);

          if (response.ok) {
            addLog("✅ Bid created successfully!", "success");
            addLog(JSON.stringify(result, null, 2), "success");
          } else {
            addLog(
              `❌ Error: ${result.message || "Failed to create bid"}`,
              "error",
            );
          }
        } catch (error) {
          addLog(`❌ Request failed: ${error.message}`, "error");
        } finally {
          createBidBtn.textContent = "Create Bid";
          createBidBtn.disabled = false;
        }
      }

      async function fetchBids(shipment_id) {
        const token = jwtTokenInput.value.trim();
        if (!token) {
          addLog("Please enter JWT token", "error");
          return;
        }

        const targetShipmentId =
          shipment_id || document.getElementById("bid_shipment_id").value;

        refreshBidsBtn.textContent = "Loading...";
        refreshBidsBtn.disabled = true;

        try {
          const response = await fetch(
            `https://logistics-shipment-management-backend.onrender.com/api/v1/bid/${targetShipmentId}`,
            {
              method: "GET",
              headers: {
                Authorization: token,
              },
            },
          );

          const result = await response.json();

          if (response.ok) {
            updateBidsList(result.data || []);
            addLog(`📊 Fetched ${result.data?.length || 0} bids`, "success");
          } else {
            addLog(
              `❌ Error: ${result.message || "Failed to fetch bids"}`,
              "error",
            );
          }
        } catch (error) {
          addLog(`❌ Request failed: ${error.message}`, "error");
        } finally {
          refreshBidsBtn.textContent = "Refresh";
          refreshBidsBtn.disabled = false;
        }
      }

      // Auto-sync shipment ID between room and bid form
      shipmentIdInput.addEventListener("input", (e) => {
        document.getElementById("bid_shipment_id").value = e.target.value;
      });

      // Event Listeners
      connectBtn.addEventListener("click", connectSocket);
      disconnectBtn.addEventListener("click", disconnectSocket);
      joinRoomBtn.addEventListener("click", joinRoom);
      leaveRoomBtn.addEventListener("click", leaveRoom);
      createBidBtn.addEventListener("click", createBid);
      refreshBidsBtn.addEventListener("click", () => fetchBids());
      clearLogsBtn.addEventListener("click", () => {
        consoleLog.innerHTML = "";
        addLog("Logs cleared", "info");
      });

      // Initialize
      addLog("Socket Bid Tester initialized", "info");
      addLog("Enter JWT token and connect to get started", "info");
    </script>
  </body>
</html>
